<!DOCTYPE html>
<html>
<head>
  <title>ReelSuccess</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="icon.png" />
</head>
<body>
  <div class="overlay"></div>

  <div class="container">
    <div class="card reelsuccess-card">
      <img src="icon.png" class="logo" />
      <h1>ReelSuccess</h1>
      <p class="subtitle">Find similar theaters and proven movie recommendations.</p>

      <p style="margin: 0 0 10px; text-align: left;">
        <a href="index.html" class="app-link">← Back to ReelVotes</a>
      </p>

      <div class="reelsuccess-controls">
        <div class="reelsuccess-search-row">
          <input id="theaterSearchInput" class="search-input" type="text" placeholder="Search theater, city, or code..." autocomplete="off" />
          <button id="myTheaterButton" class="reelsuccess-any-button" type="button">My Theater</button>
        </div>
        <select id="theaterSelect" class="reelsuccess-select">
          <option value="">Loading theaters...</option>
        </select>
      </div>

      <p id="reelsuccessStatus" class="subtitle" style="margin-top:10px;"></p>

      <section id="reelsuccessProfile" class="info-box hidden"></section>

      <section id="reelsuccessSimilarSection" class="info-box hidden">
        <h2>Most Similar Theaters</h2>
        <div class="reelsuccess-table-wrap">
          <table class="reelsuccess-table">
            <thead>
              <tr>
                <th>Theater</th>
                <th>City</th>
                <th>Score</th>
              </tr>
            </thead>
            <tbody id="similarTheatersBody"></tbody>
          </table>
        </div>
      </section>

      <section id="reelsuccessRecsSection" class="info-box hidden">
        <h2>Recommended Movies</h2>
        <div class="reelsuccess-table-wrap">
          <table class="reelsuccess-table">
            <thead>
              <tr>
                <th>Movie</th>
                <th>Score</th>
                <th>Support</th>
              </tr>
            </thead>
            <tbody id="recommendationsBody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <div id="loginModal" class="vote-email-modal hidden" role="dialog" aria-modal="true" aria-labelledby="loginModalTitle">
    <div class="vote-email-modal-card email-step">
      <img src="icon.png" style="width:48px;display:block;margin:0 auto 12px;" />
      <h2 id="loginModalTitle" style="text-align:center;margin-bottom:4px;">ReelSuccess Login</h2>
      <p class="subtitle vote-email-disclaimer">Enter your authorized theater email to continue.</p>
      <label for="loginEmailInput">Email address</label>
      <input id="loginEmailInput" type="email" placeholder="you@yourtheater.com" autocomplete="email" />
      <p id="loginEmailError" class="email-help" style="color:#ff6b6b;margin-top:6px;min-height:18px;"></p>
      <div style="margin-top:10px;">
        <button id="loginSubmitBtn" type="button" class="submit-btn" style="width:100%;margin-top:0;">Continue</button>
      </div>
    </div>
  </div>

  <script type="module" src="reelsuccess.js"></script>
</body>
</html>
