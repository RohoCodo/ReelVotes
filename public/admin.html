<!DOCTYPE html>
<html>
<head>
  <title>ReelVotes – Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="icon.png" />
</head>
<body>

<div class="overlay"></div>

<div class="container">
  <div class="card">
    <img src="icon.png" class="logo" />
    <h1>Live Vote Dashboard</h1>
    <p class="subtitle">For theater staff – updates in real time.</p>

    <div style="margin: 12px 0;">
      <select id="eventSelector" style="width:100%;padding:8px 10px;border-radius:8px;border:1px solid #ccc;font-size:14px;background:#fff;cursor:pointer;">
        <option value="">Loading events…</option>
      </select>
    </div>

    <p id="eventLabel" class="subtitle"></p>
    <p id="updatedAt" class="subtitle"></p>

    <div style="margin: 8px 0 14px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <button id="runEliminationBtn" type="button" style="background:#ff4757;border:none;color:#fff;padding:10px 14px;border-radius:10px;font-weight:700;cursor:pointer;">Run elimination round now</button>
      <span id="eliminationStatus" class="subtitle" style="margin:0;"></span>
    </div>

    <div id="adminMovies" class="chosen-section">
      <div class="ballot-section">
        <p class="chosen-label">Movies on the ballot:</p>
        <div id="ballotList" class="chosen-list" style="margin-bottom:16px;"></div>
      </div>
      <p class="chosen-label" style="margin-top:8px;">Live vote counts:</p>
      <div id="adminList" class="chosen-list"></div>
    </div>

    <p class="track-results">
      <a href="index.html" class="app-link">Back to voting →</a>
      <span aria-hidden="true"> • </span>
      <a href="reelsuccess.html" class="app-link">Open ReelSuccess →</a>
    </p>
  </div>
</div>

<div id="loginModal" class="vote-email-modal hidden" role="dialog" aria-modal="true" aria-labelledby="loginModalTitle">
  <div class="vote-email-modal-card email-step">
    <img src="icon.png" style="width:48px;display:block;margin:0 auto 12px;" />
    <h2 id="loginModalTitle" style="text-align:center;margin-bottom:4px;">Theater Staff Login</h2>
    <p class="subtitle vote-email-disclaimer">Enter your authorized theater email to continue.</p>
    <label for="loginEmailInput">Email address</label>
    <input id="loginEmailInput" type="email" placeholder="you@yourtheater.com" autocomplete="email" />
    <p id="loginEmailError" class="email-help" style="color:#ff6b6b;margin-top:6px;min-height:18px;"></p>
    <div style="margin-top:10px;">
      <button id="loginSubmitBtn" type="button" class="submit-btn" style="width:100%;margin-top:0;">Continue</button>
    </div>
  </div>
</div>

<script src="events-config.js"></script>
<script type="module" src="admin.js"></script>
</body>
</html>
